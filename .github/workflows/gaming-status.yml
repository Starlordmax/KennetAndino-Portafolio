name: Gaming Status

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch gaming profiles
        env:
          RA_USERNAME: ${{ secrets.RA_USERNAME }}
          RA_API_KEY: ${{ secrets.RA_API_KEY }}
          XBL_API_KEY: ${{ secrets.XBL_API_KEY }}
          PSN_REFRESH_TOKEN: ${{ secrets.PSN_REFRESH_TOKEN }}
          PSN_ONLINE_ID: ${{ secrets.PSN_ONLINE_ID }}
        run: node scripts/fetch-gaming-status.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gaming-status.json
          git diff --staged --quiet || git commit -m "chore: update gaming status"
          git push
